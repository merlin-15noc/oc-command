name: oc-command

services:
  app:
    image: ghcr.io/merlin-15noc/oc-command:latest
    container_name: oc-command
    restart: unless-stopped
    environment:
      OC_GATEWAY_URL: ${OC_GATEWAY_URL:-http://openclaw-wk4e-openclaw-1:50696}
      OC_GATEWAY_TOKEN: ${OC_GATEWAY_TOKEN}
      WORKSPACE_PATH: ${WORKSPACE_PATH:-/data/.openclaw/workspace}
      NEXT_PUBLIC_APP_NAME: OC Command
      NEXT_PUBLIC_APP_URL: https://oc.lancer.is
    volumes:
      - ${WORKSPACE_PATH:-/docker/openclaw-wk4e/data/.openclaw/workspace}:/data/.openclaw/workspace:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oc-command.rule=Host(`oc.lancer.is`)"
      - "traefik.http.routers.oc-command.entrypoints=websecure"
      - "traefik.http.routers.oc-command.tls=true"
      - "traefik.http.routers.oc-command.tls.certresolver=letsencrypt"
      - "traefik.http.services.oc-command.loadbalancer.server.port=3000"
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - openclaw_shared

  watchtower:
    image: containrrr/watchtower
    container_name: oc-command-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REPO_USER=${GHCR_USER:-merlin-15noc}
      - REPO_PASS=${GHCR_TOKEN}
    command: --label-enable --cleanup --interval 60 --rolling-restart
    restart: unless-stopped

networks:
  openclaw_shared:
    external: true
