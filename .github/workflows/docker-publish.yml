name: Docker Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/merlin-15noc/oc-command:latest
            ghcr.io/merlin-15noc/oc-command:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/merlin-15noc/oc-command:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/merlin-15noc/oc-command:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
